[tox]
envlist =
  py{313}

[testenv]
deps=
  -rrequirements-test.txt
  -rrequirements.txt
allowlist_externals=pytest
setenv =
       PIP_CONSTRAINT = {toxinidir}/constraints.txt

commands=
  pytest -s tests
  ruff check .
  mypy .


[testenv:test]
commands=
  pytest -s tests {posargs}

[testenv:test-verbose]
commands=
  pytest -rP tests {posargs}

[testenv:test-with-postgresql]
commands=
  pytest -s tests {posargs}
setenv =
       TEST_DATABASE_URI = postgresql+pg8000://postgres:postgres@localhost:5432


[testenv:ruff]
commands =
  ruff check .
  ruff format --check --diff .

[testenv:mypy]
commands =
  mypy .
