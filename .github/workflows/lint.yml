name: Linting and formatting checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node-lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # Pin npm >= 11.16 so the v12 install defaults in .npmrc are enforced
      # regardless of the npm bundled with Node. (--engine-strict=false so this
      # bootstrap step itself isn't gated by package.json "engines".)
      - name: Upgrade npm to enforce npm v12 install defaults
        run: npm install -g npm@11.16.0 --engine-strict=false
      - name: Install dependencies
        run: npm ci
      - name: Check prettier formatting
        run: npx prettier --check .
  python-lint:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          # Pin uv itself (not "latest") so a compromised uv release can't
          # run in CI. Keep in sync with the uv version in the Dockerfile.
          version: "0.11.10"
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --locked
      - name: Run ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Run ty
        run: uv run ty check .
