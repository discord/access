name: OpenAPI client drift

# Fails a PR if the generated TypeScript client in `src/api/` is out of sync
# with the backend's OpenAPI spec — i.e. someone changed a route/schema (or
# hand-edited the generated files) without re-running the codegen. Regenerates
# the client from the spec and checks that nothing changed.

on:
  pull_request:

jobs:
  openapi-client-drift:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          # Pin uv itself (not "latest") so a compromised uv release can't
          # run in CI. Keep in sync with the uv version in the Dockerfile.
          version: "0.11.10"
          enable-cache: true
          python-version: "3.13"

      - name: Install backend
        run: uv sync --locked --no-dev

      - name: Dump OpenAPI spec
        # Write straight to the file so the app's startup logging (which goes to
        # stdout) doesn't pollute the JSON. `create_app(testing=True)` needs no
        # DB or env and produces the same spec the dev server serves.
        run: |
          uv run python -c "
          import json
          from api.app import create_app
          with open('openapi.json', 'w') as f:
              json.dump(create_app(testing=True).openapi(), f)
          "

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install frontend deps
        run: npm ci

      - name: Regenerate the API client
        env:
          # Makes openapi-codegen.config.ts read the spec from this file instead
          # of the live dev-server URL.
          OPENAPI_SPEC_FILE: openapi.json
        run: |
          npm run codegen
          # The pre-commit hook (lint-staged) formats the generated files with
          # prettier, so match that before diffing.
          npx prettier --write 'src/api/**/*.{ts,tsx}'

      - name: Check for drift
        run: |
          if ! git diff --quiet -- src/api; then
            echo "::error::The generated API client in src/api/ is out of sync with the backend OpenAPI spec."
            echo "Start the dev backend and run 'npm run codegen', then commit the updated src/api/ files."
            git --no-pager diff -- src/api
            exit 1
          fi
          echo "Generated API client is in sync with the backend OpenAPI spec."
