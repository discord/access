version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      pip-major:
        patterns:
          - "*"
        update-types:
        - "major"
      pip-minor:
        patterns:
          - "*"
        update-types:
        - "minor"
        - "patch"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "@rollup/rollup-*"
      # Vite 8's Rolldown-based dep optimizer miscompiles our MUI v5 +
      # styled-components dependency graph (rolldown/rolldown#9515 and #8950),
      # blank-screening the dev server. Re-attempt the major bump once a Vite 8
      # release ships a Rolldown with both fixed. @vitejs/plugin-react >=6
      # requires Vite 8, so it is held back with it (5.x still supports Vite 7).
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        versions: [">=6"]
    groups:
      mui:
        patterns:
          - "@mui/*"
      sentry:
        patterns:
          - "@sentry/*"
      react-core:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      build-tools:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "prettier"
          - "husky"
          - "lint-staged"
      npm-major:
        patterns:
          - "*"
        update-types:
          - "major"
      npm-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    # Workflow files stored in the
    # default location of `.github/workflows`
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-action-group:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
