[mypy]
# https://mypy.readthedocs.io/en/stable/existing_code.html#introduce-stricter-options
strict = True
warn_return_any = False
ignore_missing_imports = True

[mypy-api.models.*]
# `db.Model` is provided by the `api.extensions` shim at runtime; mypy
# doesn't see it as a class statement. The shim is intentionally
# transitional (POST_MIGRATION_TODO #1) and the models are otherwise
# inherited from the Flask era.
disallow_subclassing_any = False
disable_error_code = name-defined,union-attr,return-value,assignment

# Per POST_MIGRATION_TODO #14, strict mypy on api/routers/ and api/schemas/
# is a deferred follow-up. The migration prioritized wire-compatibility over
# clean type annotations; tightening these modules is a separate task that
# pairs with the openapi-codegen regen and the eventual async-SQLAlchemy
# move (#2). Until then, relax the strict checks that fire heavily on the
# Pydantic + FastAPI plumbing.
[mypy-api.routers.*]
disallow_untyped_defs = False
disallow_untyped_calls = False
disallow_incomplete_defs = False
disable_error_code = attr-defined,union-attr,arg-type,var-annotated,type-arg,return-value,assignment,no-untyped-def

[mypy-api.schemas.*]
disallow_untyped_defs = False
disallow_untyped_calls = False
disable_error_code = attr-defined,union-attr,arg-type,var-annotated,type-arg,return-value,no-untyped-def

[mypy-api.operations.*]
# Operations were ported in place from the Flask era and rely on the `db`
# shim's Query / `first_or_404` helpers, which mypy can't see through.
disallow_untyped_defs = False
disallow_untyped_calls = False
disable_error_code = attr-defined,union-attr,arg-type,var-annotated,type-arg,return-value,assignment,no-untyped-def,no-untyped-call

[mypy-api.auth.*]
disallow_untyped_defs = False
disallow_untyped_calls = False
disable_error_code = attr-defined,union-attr,arg-type,var-annotated,return-value,no-untyped-call

[mypy-api.middleware]
disallow_subclassing_any = False
disable_error_code = no-untyped-call

[mypy-api.app]
disable_error_code = arg-type,no-untyped-call

[mypy-api.manage]
disable_error_code = attr-defined,union-attr,arg-type,no-untyped-call

[mypy-api.exception_handlers]
disable_error_code = no-untyped-call

[mypy-api.extensions]
# The `db` compatibility shim wraps SQLAlchemy primitives that aren't fully
# typed; subclassing Mutable / scoped_session / SAQuery is intentional.
disallow_subclassing_any = False
disable_error_code = type-arg,assignment,return-value,no-untyped-call,attr-defined

[mypy-api.syncer]
disable_error_code = attr-defined,union-attr,arg-type,no-untyped-call,return-value

[mypy-api.integrity]
disable_error_code = attr-defined,union-attr,no-untyped-call

[mypy-api.context]
disallow_subclassing_any = False

[mypy-tests.*]
# Tests use the `db` shim's Query helpers, the `mock_user` fixture-as-callable
# pattern, and a TestClient subclass whose `request` signature is
# deliberately wider than the parent's.
disallow_untyped_defs = False
disallow_untyped_calls = False
disable_error_code = attr-defined,union-attr,arg-type,override,no-untyped-call,no-untyped-def

[mypy-tests.factories]
# Tried using types-factory-boy, but ran into "TypeError: type 'Faker' is not subscriptable" errors
disallow_any_generics = False

[mypy-migrations.*]
# Don't require typing from auto-generated Alembic migrations
disallow_untyped_calls = False
disallow_untyped_defs = False
